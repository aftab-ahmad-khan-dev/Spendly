<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07091a"/>
      <stop offset="55%" stop-color="#0c1230"/>
      <stop offset="100%" stop-color="#1a2550"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.1" r="0.75">
      <stop offset="0%" stop-color="#4f7cff" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#2a3a85" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="0.95" r="0.7">
      <stop offset="0%" stop-color="#7a55d4" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#2a3a85" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151c33"/>
      <stop offset="100%" stop-color="#0f1426"/>
    </linearGradient>
    <linearGradient id="sparkFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="headlineAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9d3ff"/>
      <stop offset="100%" stop-color="#8fa2e6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(80 76)">
    <rect width="56" height="56" rx="14" fill="#2a3a85"/>
    <path d="M17.5 37c0-8.75 3.15-13.125 7.525-13.125 3.675 0 4.2 2.275 4.2 4.375 0 2.625-1.75 3.85-4.55 3.85H21m0 0h5.425c3.15 0 5.425 2.1 5.425 5.075 0 2.8-1.925 5.075-5.25 5.075-4.2 0-7.35-2.8-7.35-2.8" stroke="#ffffff" stroke-width="3.0625" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="38.5" cy="19.25" r="3.5" fill="#ffffff"/>
    <text x="74" y="37" fill="#e6edf3" font-size="26" font-weight="600" letter-spacing="3.5">SPENDLY</text>
  </g>

  <g transform="translate(80 220)">
    <text fill="#ffffff" font-size="84" font-weight="600" letter-spacing="-2">
      <tspan x="0" y="0">Personal finance,</tspan>
    </text>
    <text fill="url(#headlineAccent)" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="84" font-weight="400" letter-spacing="-1.5">
      <tspan x="0" y="96">without the noise.</tspan>
    </text>
    <text fill="#9ca3af" font-size="24" font-weight="400" letter-spacing="0.2">
      <tspan x="0" y="178">A quiet, AI-assisted expense ledger — so you always know</tspan>
      <tspan x="0" y="212">where your money actually goes.</tspan>
    </text>
  </g>

  <g transform="translate(80 540)" font-size="14" font-weight="500">
    <g>
      <rect width="132" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
      <circle cx="18" cy="17" r="3" fill="#22c55e"/>
      <text x="30" y="22" fill="#d1d5db">AI-assisted</text>
    </g>
    <g transform="translate(148 0)">
      <rect width="118" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
      <circle cx="18" cy="17" r="3" fill="#60a5fa"/>
      <text x="30" y="22" fill="#d1d5db">Budget-aware</text>
    </g>
    <g transform="translate(282 0)">
      <rect width="108" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
      <circle cx="18" cy="17" r="3" fill="#a78bfa"/>
      <text x="30" y="22" fill="#d1d5db">Distraction-free</text>
    </g>
  </g>

  <g transform="translate(740 150)">
    <rect x="8" y="18" width="380" height="300" rx="22" fill="#000000" opacity="0.25"/>
    <rect width="380" height="300" rx="22" fill="url(#cardBg)" stroke="rgba(255,255,255,0.08)"/>

    <text x="28" y="48" fill="#9ca3af" font-size="12" font-weight="600" letter-spacing="1.5">THIS MONTH</text>
    <text x="28" y="96" fill="#ffffff" font-size="46" font-weight="700" letter-spacing="-1">$1,247.80</text>
    <g transform="translate(28 108)">
      <rect width="72" height="22" rx="11" fill="rgba(34,197,94,0.14)"/>
      <text x="12" y="15" fill="#22c55e" font-size="12" font-weight="600">-12% ↓</text>
    </g>
    <text x="108" y="124" fill="#6b7280" font-size="12">vs last month</text>

    <g transform="translate(28 158)">
      <path d="M0 42 L34 32 L68 36 L102 18 L136 24 L170 10 L204 16 L238 6 L272 12 L306 2 L324 8 L324 60 L0 60 Z" fill="url(#sparkFill)"/>
      <path d="M0 42 L34 32 L68 36 L102 18 L136 24 L170 10 L204 16 L238 6 L272 12 L306 2 L324 8" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(28 244)">
      <circle cx="12" cy="12" r="12" fill="rgba(96,165,250,0.16)"/>
      <text x="12" y="17" fill="#60a5fa" font-size="13" font-weight="700" text-anchor="middle">G</text>
      <text x="36" y="12" fill="#e6edf3" font-size="14" font-weight="600">Groceries</text>
      <text x="36" y="28" fill="#6b7280" font-size="12">24 transactions</text>
      <text x="324" y="20" fill="#ffffff" font-size="16" font-weight="600" text-anchor="end">$418.60</text>
    </g>
  </g>

  <g transform="translate(745 490)">
    <rect x="6" y="10" width="320" height="70" rx="16" fill="#000000" opacity="0.2"/>
    <rect width="320" height="70" rx="16" fill="url(#cardBg)" stroke="rgba(255,255,255,0.08)"/>
    <g transform="translate(18 18)">
      <circle cx="17" cy="17" r="17" fill="rgba(167,139,250,0.14)"/>
      <path d="M11 17 L13 14 L16 18 L20 12 L23 16" stroke="#a78bfa" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="23" cy="16" r="1.6" fill="#a78bfa"/>
    </g>
    <text x="70" y="30" fill="#e6edf3" font-size="13" font-weight="600">Ask the advisor</text>
    <text x="70" y="50" fill="#9ca3af" font-size="12">"How much did I spend on coffee?"</text>
  </g>
</svg>
